# Installation
apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  calicoNetwork:
    ipPools:
      - name: default-ipv4-ippool
        blockSize: 26
        cidr: 10.0.0.0/16
        encapsulation: VXLANCrossSubnet
        natOutgoing: Enabled
        nodeSelector: all()

        
---
# API Server
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}

---
# Goldmane
apiVersion: operator.tigera.io/v1
kind: Goldmane
metadata:
  name: default

---
# Whisker
apiVersion: operator.tigera.io/v1
kind: Whisker
metadata:
  name: default