apiVersion: v1
kind: Pod
metadata:
  name: iperf-server
  labels:
    app: iperf
spec:
  nodeName: k01-worker
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ["iperf3", "-s"]
    ports:
    - containerPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: iperf-client
  labels:
    app: iperf
spec:
  nodeName: k01-worker2
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ["sleep", "3600"]  # rimane in attesa